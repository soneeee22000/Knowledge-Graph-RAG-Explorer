name: CI

on:
  push:
    branches: ['**']
    paths:
      - 'kg-rag-explorer/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'kg-rag-explorer/**'

defaults:
  run:
    working-directory: kg-rag-explorer

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kg-rag-explorer/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
